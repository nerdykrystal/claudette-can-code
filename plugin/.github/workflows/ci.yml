name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly mutation run — Sundays at 02:00 UTC
    - cron: '0 2 * * 0'

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.11'
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.11'
          cache: npm
      - run: npm ci
      - run: npm run lint

  test:
    name: Test with Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.11'
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run test:coverage
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/

  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.11'
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Run benchmarks
        run: node --experimental-vm-modules dist/cli/index.js dry-run || true
        # Stage 05 (Haiku) will replace this with actual benchmark assertions per TQCD 7.x

  no-network:
    name: No-Network Runtime Check
    runs-on: ubuntu-latest
    env:
      NODE_NO_NETWORK: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.11'
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run test
        env:
          NODE_NO_NETWORK: '1'

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  mutation:
    name: Mutation Testing
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.11'
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run test:mutation
